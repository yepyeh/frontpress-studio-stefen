<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Accent colors</title></head><body>
<div class="eyebrow">Accents · used sparingly, mostly soft variants</div>
<div class="row-tight">
  <div class="sw"><div class="sw-chip" style="background:#09090b"></div><div class="sw-meta"><div class="sw-name">--primary</div><div class="sw-hex">#09090b</div></div></div>
  <div class="sw"><div class="sw-chip" style="background:#27272a"></div><div class="sw-meta"><div class="sw-name">--primary-hover</div><div class="sw-hex">zinc-800</div></div></div>
  <div class="sw"><div class="sw-chip" style="background:#dc2626"></div><div class="sw-meta"><div class="sw-name">--danger</div><div class="sw-hex">#dc2626</div></div></div>
  <div class="sw"><div class="sw-chip" style="background:#fef2f2;border-bottom:1px solid #fecaca"></div><div class="sw-meta"><div class="sw-name">danger-soft</div><div class="sw-hex">#fef2f2</div></div></div>
  <div class="sw"><div class="sw-chip" style="background:#15803d"></div><div class="sw-meta"><div class="sw-name">--success</div><div class="sw-hex">#15803d</div></div></div>
  <div class="sw"><div class="sw-chip" style="background:#dcfce7"></div><div class="sw-meta"><div class="sw-name">success-soft</div><div class="sw-hex">#dcfce7</div></div></div>
  <div class="sw"><div class="sw-chip" style="background:#fef3c7"></div><div class="sw-meta"><div class="sw-name">warning-soft</div><div class="sw-hex">#fef3c7</div></div></div>
</div>
</body></html>
