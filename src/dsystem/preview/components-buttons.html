<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Buttons</title></head><body>
<div class="eyebrow">Buttons · variants (color) × sizes (height)</div>
<div class="stack">
  <div class="row"><button class="btn btn-primary">Save</button><button class="btn btn-secondary">Cancel</button><button class="btn btn-ghost">Skip</button><button class="btn btn-danger">Delete</button></div>
  <div class="row"><button class="btn btn-sm btn-primary">Save</button><button class="btn btn-sm btn-secondary">Cancel</button><button class="btn btn-sm btn-danger">Delete</button><span class="small mono">sm · 32px</span></div>
  <div class="row"><button class="btn btn-lg btn-primary">Save</button><button class="btn btn-lg btn-secondary">Cancel</button><span class="small mono">lg · 40px</span></div>
  <div class="row"><button class="btn btn-primary" disabled style="opacity:.5">Disabled</button><button class="btn btn-primary" style="color:transparent;position:relative"><span>Loading</span><span style="position:absolute;inset:50% 50%;width:12px;height:12px;margin:-6px 0 0 -6px;border:2px solid #fff;border-top-color:transparent;border-radius:50%"></span></button><button class="btn-icon">×</button></div>
</div>
</body></html>
