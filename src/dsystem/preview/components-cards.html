<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Cards</title></head><body style="background:#fafafa">
<div class="eyebrow">Card containers · 1px border + shadow-card</div>
<div class="row" style="align-items:stretch">
  <div class="admin-card" style="width:200px">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">Full backup</div>
    <div style="font-size:12px;color:#71717a;margin-bottom:10px">Everything: content, config, themes, and uploads.</div>
    <div style="font-size:13px;margin-bottom:10px"><strong>Size:</strong> 14.2 MB</div>
    <button class="btn btn-sm btn-primary">Download ZIP</button>
  </div>
  <div style="width:200px;border:1px solid #e4e4e7;border-radius:8px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.05);overflow:hidden">
    <div style="aspect-ratio:4/3;background:#f4f4f5;display:flex;align-items:center;justify-content:center;color:#a1a1aa">
      <svg viewBox="0 0 60 45" width="60" height="45" fill="none" stroke="currentColor" stroke-width="1" opacity=".5"><rect x="1" y="1" width="58" height="43" rx="2"/><rect x="4" y="4" width="10" height="37" rx="1"/><rect x="18" y="4" width="39" height="6" rx="1"/><rect x="18" y="14" width="39" height="18" rx="1"/><rect x="18" y="36" width="18" height="5" rx="1"/></svg>
    </div>
    <div style="padding:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-weight:600;font-size:14px">Default</span><span style="font-size:11px;color:#71717a">v1.0.0</span><span style="font-size:11px;font-weight:600;background:#09090b;color:#fff;padding:2px 8px;border-radius:999px;margin-left:auto">Active</span></div>
      <div style="font-size:12px;color:#71717a">Clean minimal theme.</div>
    </div>
  </div>
</div>
</body></html>
