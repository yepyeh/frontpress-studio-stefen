<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css?v=3"><title>Form controls</title>
<style>
  input.form-input:focus,
  select.form-input:focus,
  input.form-input:focus-visible,
  select.form-input:focus-visible {
    outline: 2px solid #09090b !important;
    outline-offset: 2px !important;
    border-color: #d4d4d8 !important;
    box-shadow: none !important;
  }
</style>
</head><body>
<div class="eyebrow">Form inputs · 36px control height · focus: 2px outline, 2px offset</div>
<div class="stack">
  <div>
    <label class="form-label">Title</label>
    <input class="form-input" value="Hello World" style="max-width:320px">
  </div>
  <div>
    <label class="form-label">Path <span style="color:#71717a;font-weight:400;font-size:12px">(e.g. blog/my-post)</span></label>
    <input class="form-input" value="blog/my-post" style="font-family:ui-monospace,Menlo,monospace;font-size:12px;max-width:320px">
  </div>
  <div>
    <label class="form-label">Type</label>
    <select class="form-input" style="max-width:220px;appearance:none;background-image:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%2371717a%22 stroke-width=%222%22><polyline points=%226 9 12 15 18 9%22/></svg>');background-repeat:no-repeat;background-position:right 12px center;padding-right:32px"><option>All types</option></select>
  </div>
  <div class="small" style="margin-top:4px">Click or tab into any input — 2px black outline appears with 2px gap from the border.</div>
</div>
</body></html>
