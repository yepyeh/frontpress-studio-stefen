<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Table row</title></head><body>
<div class="eyebrow">Pages table · 11px uppercase headers, 13px rows</div>
<table style="width:100%;border-collapse:collapse;font-size:13px">
  <thead>
    <tr style="border-bottom:1px solid #e4e4e7">
      <th style="text-align:left;padding:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#71717a">Title</th>
      <th style="text-align:left;padding:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#71717a">Path</th>
      <th style="text-align:left;padding:12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#71717a">Type</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    <tr style="border-bottom:1px solid #f4f4f5">
      <td style="padding:12px"><strong>Hello World</strong></td>
      <td style="padding:12px;color:#71717a;font-family:ui-monospace,Menlo,monospace;font-size:11px">blog/hello-world</td>
      <td style="padding:12px;color:#71717a;font-size:12px">blog</td>
      <td style="padding:12px;text-align:right"><button class="btn btn-sm btn-secondary">Edit</button> <button class="btn btn-sm btn-danger">Delete</button></td>
    </tr>
    <tr style="border-bottom:1px solid #f4f4f5">
      <td style="padding:12px"><strong>On Ultralight PHP</strong> <span class="badge badge-draft">Draft</span></td>
      <td style="padding:12px;color:#71717a;font-family:ui-monospace,Menlo,monospace;font-size:11px">blog/ultralight-php</td>
      <td style="padding:12px;color:#71717a;font-size:12px">blog</td>
      <td style="padding:12px;text-align:right"><button class="btn btn-sm btn-secondary">Edit</button> <button class="btn btn-sm btn-danger">Delete</button></td>
    </tr>
  </tbody>
</table>
</body></html>
