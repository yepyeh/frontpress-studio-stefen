<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Focus ring</title></head><body>
<div class="eyebrow">Focus ring · shadcn-style, 2px solid + 2px offset</div>
<div class="row" style="gap:20px;padding:10px 0 18px">
  <button class="btn btn-primary" style="outline:2px solid #09090b;outline-offset:2px">Primary</button>
  <button class="btn btn-secondary" style="outline:2px solid #09090b;outline-offset:2px">Secondary</button>
  <input class="form-input" value="Focused input" style="width:220px;border-color:#09090b;box-shadow:0 0 0 3px rgba(9,9,11,.12)">
</div>
<div class="sep"></div>
<div class="eyebrow">Error state</div>
<div class="row">
  <input class="form-input" value="my post" style="width:220px;border-color:#dc2626;box-shadow:0 0 0 3px rgba(220,38,38,.2)">
  <span style="color:#dc2626;font-size:12px">Path must be lowercase letters, numbers, hyphens, and slashes.</span>
</div>
</body></html>
