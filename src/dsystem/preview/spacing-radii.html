<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Spacing & radii</title></head><body>
<div class="eyebrow">Spacing scale · 4px grid</div>
<div class="row" style="align-items:flex-end">
  <div style="text-align:center"><div style="width:4px;height:24px;background:#09090b"></div><div class="small mono" style="margin-top:4px">1 / 4</div></div>
  <div style="text-align:center"><div style="width:8px;height:24px;background:#09090b"></div><div class="small mono" style="margin-top:4px">2 / 8</div></div>
  <div style="text-align:center"><div style="width:12px;height:24px;background:#09090b"></div><div class="small mono" style="margin-top:4px">3 / 12</div></div>
  <div style="text-align:center"><div style="width:16px;height:24px;background:#09090b"></div><div class="small mono" style="margin-top:4px">4 / 16</div></div>
  <div style="text-align:center"><div style="width:20px;height:24px;background:#09090b"></div><div class="small mono" style="margin-top:4px">5 / 20</div></div>
  <div style="text-align:center"><div style="width:24px;height:24px;background:#09090b"></div><div class="small mono" style="margin-top:4px">6 / 24</div></div>
  <div style="text-align:center"><div style="width:32px;height:24px;background:#09090b"></div><div class="small mono" style="margin-top:4px">8 / 32</div></div>
</div>
<div class="sep"></div>
<div class="eyebrow">Radii · sm 4 / md 6 / lg 8 / pill 999</div>
<div class="row-tight">
  <div style="text-align:center"><div style="width:64px;height:40px;background:#fff;border:1px solid #e4e4e7;border-radius:4px"></div><div class="small mono" style="margin-top:4px">sm · 4</div></div>
  <div style="text-align:center"><div style="width:64px;height:40px;background:#fff;border:1px solid #e4e4e7;border-radius:6px"></div><div class="small mono" style="margin-top:4px">md · 6</div></div>
  <div style="text-align:center"><div style="width:64px;height:40px;background:#fff;border:1px solid #e4e4e7;border-radius:8px"></div><div class="small mono" style="margin-top:4px">lg · 8</div></div>
  <div style="text-align:center"><div style="width:64px;height:22px;background:#fff;border:1px solid #e4e4e7;border-radius:999px;margin-top:9px"></div><div class="small mono" style="margin-top:13px">pill · 999</div></div>
</div>
</body></html>
