<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FrontPress Admin — UI Kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="app"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Kit modules -->
  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="PagesList.jsx"></script>
  <script type="text/babel" src="Editor.jsx"></script>
  <script type="text/babel" src="MediaLibrary.jsx"></script>
  <script type="text/babel" src="Themes.jsx"></script>
  <script type="text/babel" src="Login.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const pageTitleFor = (route, folder, editing) => {
      if (route === "pages")    return folder ? folder[0].toUpperCase() + folder.slice(1) : "All Content";
      if (route === "new")      return "New page";
      if (route === "edit")     return `Edit: ${editing?.title ?? "Untitled"}`;
      if (route === "media")    return "Media library";
      if (route === "themes")   return "Themes";
      if (route === "backup")   return "Backup";
      if (route === "settings") return "Settings";
      return "Admin";
    };

    function App() {
      const [signedIn, setSignedIn] = useState(true); // start in app; toggle to false via "Log out"
      const [route, setRoute] = useState("pages");
      const [folder, setFolder] = useState(null);
      const [editing, setEditing] = useState(null);
      const [toast, setToast] = useState(null);
      const [toastKind, setToastKind] = useState("default");
      const [user, setUser] = useState("admin");

      const showToast = (message, kind = "default") => {
        setToast(null);
        setTimeout(() => { setToastKind(kind); setToast(message); }, 0);
      };

      const navigate = (r, f) => {
        if (r === "logout") { setSignedIn(false); return; }
        setRoute(r);
        if (f !== undefined) setFolder(f);
        setEditing(null);
      };

      if (!signedIn) {
        return <Login onSubmit={({ user }) => { setUser(user || "admin"); setSignedIn(true); setRoute("pages"); }} />;
      }

      let content;
      if (route === "pages") {
        content = <PagesList
          folder={folder}
          onEdit={p => { setEditing(p); setRoute("edit"); }}
          onNew={() => { setEditing(null); setRoute("new"); }}
          onDelete={p => showToast(`Deleted "${p.title}"`, "default")}
          onRebuildCache={() => showToast("Cache rebuilt.", "success")} />;
      } else if (route === "edit" || route === "new") {
        content = <Editor
          page={editing}
          onSave={f => { showToast("Saved draft.", "success"); setEditing(f); }}
          onPublish={f => { showToast(`Published "${f.title}"`, "success"); setEditing(f); setRoute("pages"); }}
          onCancel={() => setRoute("pages")}
          onViewLive={() => showToast("Opening public page…", "default")} />;
      } else if (route === "media") {
        content = <MediaLibrary onToast={showToast} />;
      } else if (route === "themes") {
        content = <ThemesGrid onToast={showToast} />;
      } else if (route === "backup") {
        content = <BackupStub onToast={showToast} />;
      } else if (route === "settings") {
        content = <SettingsStub onToast={showToast} />;
      }

      return (
        <>
          <AdminBar pageTitle={pageTitleFor(route, folder, editing)} />
          <div className="admin-layout">
            <Sidebar active={route} activeFolder={folder} onNavigate={navigate} user={user} />
            <div className="admin-main"><div className="admin-wrap">{content}</div></div>
          </div>
          <Toast message={toast} kind={toastKind} onDone={() => setToast(null)} />
        </>
      );
    }

    // Two small inline screens — not every admin page has its own component file.
    function BackupStub({ onToast }) {
      return (
        <>
          <div className="admin-card">
            <div className="list-header">
              <h1>Backup</h1>
            </div>
            <div style={{ display: "grid", gap: "var(--space-4)", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))" }}>
              <BackupTile title="Full backup" desc="Everything: content, config, themes, uploads." size="14.2 MB" onToast={onToast} />
              <BackupTile title="Content only" desc="Markdown files in content/ and cache/ meta." size="2.1 MB" onToast={onToast} />
              <BackupTile title="Themes only" desc="Templates and assets under site/themes/." size="420 KB" onToast={onToast} />
            </div>
          </div>
          <div className="admin-card">
            <div className="list-header"><h1 style={{ fontSize: 16 }}>Restore</h1></div>
            <div style={{
              background: "var(--warning-soft-bg)", color: "var(--warning-soft-fg)",
              padding: "12px 16px", borderRadius: "var(--radius-md)", fontSize: 13
            }}>
              Restoring will overwrite existing files. Type <code style={{ fontFamily: "ui-monospace, Menlo, monospace" }}>RESTORE</code> to confirm.
            </div>
          </div>
        </>
      );
    }
    function BackupTile({ title, desc, size, onToast }) {
      return (
        <div style={{
          border: "1px solid var(--border)", borderRadius: "var(--radius-lg)",
          padding: "var(--space-4)", background: "var(--surface)", boxShadow: "var(--elevation-1)"
        }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>{title}</div>
          <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 10 }}>{desc}</div>
          <div style={{ fontSize: 13, marginBottom: 10 }}><strong>Size:</strong> {size}</div>
          <button className="btn btn-primary btn-sm" onClick={() => onToast("Download started…", "default")}>Download ZIP</button>
        </div>
      );
    }

    function SettingsStub({ onToast }) {
      const [form, setForm] = React.useState({
        siteName: "My Markdown Site",
        basePath: "/",
        description: "Notes and writing about building small software.",
      });
      const update = (k, v) => setForm(f => ({ ...f, [k]: v }));
      return (
        <div className="admin-card" style={{ maxWidth: 640 }}>
          <div className="list-header"><h1>Settings</h1></div>
          <div className="form-group">
            <label className="form-label">Site name</label>
            <input className="form-input" style={{ width: "100%" }} value={form.siteName} onChange={e => update("siteName", e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">
              Base path <span style={{ color: "var(--text-muted)", fontWeight: 400, fontSize: 12 }}>(/ for root, /subfolder for subfolder installs)</span>
            </label>
            <input className="form-input" style={{ width: "100%", fontFamily: "ui-monospace, Menlo, monospace", fontSize: 12 }} value={form.basePath} onChange={e => update("basePath", e.target.value)} />
          </div>
          <div className="form-group">
            <label className="form-label">
              Description <span style={{ color: "var(--text-muted)", fontWeight: 400, fontSize: 12 }}>(meta description)</span>
            </label>
            <textarea className="form-input" style={{ width: "100%", minHeight: 80, fontFamily: "inherit", fontSize: 13 }} value={form.description} onChange={e => update("description", e.target.value)} />
          </div>
          <div style={{ marginTop: "var(--space-6)", display: "flex", gap: 8 }}>
            <button className="btn btn-primary" onClick={() => onToast("Saved.", "success")}>Save</button>
            <button className="btn btn-ghost">Cancel</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
